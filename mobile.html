<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css">

<body>
        <section class="bloqueio" id="bloqueio" style=>
            <div class="bloqueio-app">

                    <button>9</button>

            </div>

                    </div>
                </header>
                <div class="tela-app">
                    <div class="app">
                        <div class="app-icone">
                            <img src="assets/img/app.png" alt="sobre" width="60">

                        </div>
                        <div class="app-icone">

                        </div>
                        <div class="app-icone">
                            <img src="assets/img/app3.png" alt="sobre" width="60">

                        </div>
                        <div class="app-icone">
                            <img src="assets/img/app4.png" alt="sobre" width="60">

                        </div>
                        <div class="app-icone">
                            <img src="assets/img/app5.png" alt="sobre" width="60">

                        </div>

                            <img src="assets/img/app6.png" alt="sobre" width="60">

                    </div>
                </div>
                <aside class="dock">
                    <div class="dock-x">
                        <div class="dock-app">
                            <div class="app-dock">
                                <img src="assets/img/app.png" alt="sobre" width="50">
                            </div>
                            <div class="app-dock">
                                <img src="assets/img/app1.png" alt="sobre" width="50">
                            </div>
                            <div class="app-dock">
                                <img src="assets/img/app2.png" alt="sobre" width="50">
                            </div>
                            <div class="app-dock">
                                <img src="assets/img/app3.png" alt="sobre" width="50">
